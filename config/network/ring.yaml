# Ring topology: each data center only talks to its two immediate
# neighbors. Synchronization must traverse multiple hops to reach
# distant workers, so latency accumulates along the ring.
seed: 42
simulate_real_time: false

topology:
  type: ring
  num_workers: 5
  coordinator_index: 0
  worker_names: [dc_1, dc_2, dc_3, dc_4, dc_5]

latency:
  mode: uniform
  uniform_low_ms: 20.0
  uniform_high_ms: 80.0
  seed: 42

bandwidth:
  bandwidth_mbps: 80.0
  serialization_overhead_ms: 5.0
  deserialization_overhead_ms: 5.0

failure:
  enabled: false
  packet_loss_prob: 0.0
  delayed_sync_prob: 0.0
  delay_multiplier: 3.0
  dropped_sync_prob: 0.0
  disconnected_workers: []
  disconnect_start_round: null
  disconnect_end_round: null
  seed: 42

monitoring:
  sampling_interval_seconds: 1.0
