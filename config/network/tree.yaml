# Tree topology: a hierarchical, binary-branching structure. Models
# aggregation through intermediate regional hubs before reaching the
# root coordinator.
seed: 42
simulate_real_time: false

topology:
  type: tree
  num_workers: 5
  coordinator_index: 0
  branching_factor: 2
  worker_names: [dc_1, dc_2, dc_3, dc_4, dc_5]

latency:
  mode: constant
  constant_ms: 35.0
  seed: 42

bandwidth:
  bandwidth_mbps: 90.0
  serialization_overhead_ms: 5.0
  deserialization_overhead_ms: 5.0

failure:
  enabled: false
  packet_loss_prob: 0.0
  delayed_sync_prob: 0.0
  delay_multiplier: 3.0
  dropped_sync_prob: 0.0
  disconnected_workers: []
  disconnect_start_round: null
  disconnect_end_round: null
  seed: 42

monitoring:
  sampling_interval_seconds: 1.0
